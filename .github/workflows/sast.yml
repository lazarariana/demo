name: SAST Security Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: lazarariana/sast-licenta
          path: sast-licenta
          token: ${{ secrets.SAST_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: build
        run: dotnet build sast-licenta/PhpAnalyzer.csproj --nologo -c Release

      - name: scan
        run: |
          dotnet run --project sast-licenta/PhpAnalyzer.csproj --no-build -c Release -- \
            scan "$GITHUB_WORKSPACE" --no-save --sarif sast.sarif
        continue-on-error: true

      - name: upload-sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast.sarif
          category: phpanalyzer

      - name: diff-check
        if: >
          github.event_name == 'push' &&
          github.event.before != '0000000000000000000000000000000000000000'
        run: |
          report=$(dotnet run --project sast-licenta/PhpAnalyzer.csproj --no-build -c Release -- \
            diff "$GITHUB_WORKSPACE" "${{ github.event.before }}" "${{ github.sha }}" 2>&1)
          printf '%s\n' "$report"
          printf '%s\n' "$report" | grep -Eq '\[NEW\][[:space:]]+\[ERROR' && exit 1 || exit 0